<!DOCTYPE html>
<html lang="ko" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>mark77234's Blog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="styles/styles.css" />
  </head>
  <body>
    <!-- 스크롤 진행률 표시기 -->
    <div class="scroll-progress"></div>

    <!-- 파티클 배경 -->
    <canvas id="particle-canvas"></canvas>

    <!-- 테마 토글 버튼 -->
    <button class="theme-toggle">
      <i class="fas fa-moon"></i>
    </button>

    <!-- 헤더 -->
    <header class="header">
      <div class="container">
        <h1 class="logo">
          <a href="index.html"> mark77234's Blog </a>
        </h1>
        <nav class="nav">
          <ul>
            <li><a href="#" id="homeBtn">Home</a></li>
            <li><a href="#" id="aboutBtn">About</a></li>
            <li><a href="#" id="contactBtn">Contact</a></li>
          </ul>
        </nav>
        <button class="hamburger">
          <div class="bar"></div>
        </button>
      </div>
    </header>

    <!-- 메인 컨텐츠 -->
    <div class="container blog-layout">
      <!-- 사이드바 -->
      <aside class="sidebar">
        <div class="profile-card">
          <h2>mark77234</h2>
          <p>iOS & Web Developer</p>
          <div class="social-links">
            <a
              href="https://www.instagram.com/bong_chanii/"
              target="_blank"
              class="social-icon"
            >
              <i class="fab fa-instagram"></i>
            </a>
            <a
              href="https://mark7723.tistory.com/"
              target="_blank"
              class="social-icon"
            >
              <i class="fas fa-t"></i>
            </a>
          </div>
          <!-- 태그 클라우드 -->
          <div class="tag-cloud"></div>
        </div>
      </aside>

      <!-- 미니게임 -->
      <div class="mini-game">
        <div id="game-container">
          <div id="dino"></div>
          <div id="obstacle"></div>
          <div id="score">Score: 0</div>
          <button id="start-btn">게임 시작</button>
        </div>
      </div>

      <!-- 메인 콘텐츠 -->
      <main class="content">
        <section id="posts" class="posts-grid"></section>
      </main>
    </div>

    <!-- JavaScript -->
    <script src="scripts/main.js"></script>
  </body>
</html>
