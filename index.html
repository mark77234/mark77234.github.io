<!DOCTYPE html>
<html lang="ko" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <title>Byeonchan.log</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <button class="theme-toggle" aria-label="Toggle theme">
      <i class="fas fa-moon"></i>
    </button>

    <header class="header">
      <div class="container">
        <h1 class="logo">
          <a href="index.html">Byeonchan.log</a>
        </h1>

        <nav class="nav">
          <ul>
            <li><a href="#" data-page="home">Home</a></li>
            <li><a href="#" data-page="posts">Posts</a></li>
            <li><a href="#" data-page="games">Games</a></li>
          </ul>
        </nav>

        <button class="hamburger" aria-label="Toggle navigation">
          <div class="bar"></div>
        </button>
      </div>
    </header>

    <div class="log-layout">
      <aside class="intro">
        <section class="profile-card">
          <h2>이병찬</h2>
          <p>App Developer</p>

          <div class="social-links">
            <a
              href="https://www.instagram.com/bong_chanii/"
              target="_blank"
              rel="noopener"
            >
              <i class="fab fa-instagram"></i>
            </a>
            <a
              href="https://mark7723.tistory.com/"
              target="_blank"
              rel="noopener"
            >
              <i class="fas fa-t"></i>
            </a>
            <a
              href="https://github.com/mark77234"
              target="_blank"
              rel="noopener"
            >
              <i class="fab fa-github"></i>
            </a>
          </div>

          <div class="tag-cloud"></div>
        </section>
      </aside>

      <main class="content">
        <section class="subs-grid"></section>
      </main>
    </div>

    <script src="js/main.js" type="module"></script>
  </body>
</html>
