<!-- gravity-puzzle.html -->
<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gravity Puzzle</title>
    <style>
      body {
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: #2c3e50;
        touch-action: none;
      }
      #gameContainer {
        position: relative;
        width: 360px;
        height: 640px;
        background: #34495e;
        border-radius: 20px;
        overflow: hidden;
      }
      .ball {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        position: absolute;
        cursor: pointer;
      }
      .goal {
        width: 40px;
        height: 40px;
        border: 3px dashed #2ecc71;
        border-radius: 50%;
        position: absolute;
      }
    </style>
  </head>
  <body>
    <div id="gameContainer"></div>
    <script>
      class GravityPuzzle {
        constructor() {
          this.container = document.getElementById("gameContainer");
          this.balls = [];
          this.goals = [];
          this.currentRotation = 0;
          this.isDragging = false;
          this.init();
        }

        init() {
          this.createLevel(1);
          this.initControls();
        }

        createLevel(level) {
          // 레벨에 따른 오브젝트 생성
          this.balls = [this.createBall(100, 100, "#e74c3c")];
          this.goals = [this.createGoal(260, 500)];

          // 회전 이벤트 리스너
          this.container.style.transform = `rotate(${this.currentRotation}deg)`;
        }

        createBall(x, y, color) {
          const ball = document.createElement("div");
          ball.className = "ball";
          ball.style.backgroundColor = color;
          ball.style.left = x + "px";
          ball.style.top = y + "px";
          this.container.appendChild(ball);
          return ball;
        }

        createGoal(x, y) {
          const goal = document.createElement("div");
          goal.className = "goal";
          goal.style.left = x + "px";
          goal.style.top = y + "px";
          this.container.appendChild(goal);
          return goal;
        }

        initControls() {
          let startY = 0;
          let startRotation = 0;

          document.addEventListener("touchstart", (e) => {
            e.preventDefault();
            startY = e.touches[0].clientY;
            startRotation = this.currentRotation;
            this.isDragging = true;
          });

          document.addEventListener("touchmove", (e) => {
            if (!this.isDragging) return;
            const deltaY = e.touches[0].clientY - startY;
            this.currentRotation = startRotation + deltaY * 0.5;
            this.container.style.transform = `rotate(${this.currentRotation}deg)`;
            this.applyPhysics();
          });

          document.addEventListener("touchend", () => {
            this.isDragging = false;
            this.checkWinCondition();
          });
        }

        applyPhysics() {
          const gravity = 0.5;
          this.balls.forEach((ball) => {
            let velY = parseFloat(ball.dataset.velY) || 0;
            velY += gravity;
            const currentY = parseFloat(ball.style.top) || 0;
            ball.style.top = Math.min(currentY + velY, 610) + "px";
            ball.dataset.velY = velY;
          });
        }

        checkWinCondition() {
          const ballRect = this.balls[0].getBoundingClientRect();
          const goalRect = this.goals[0].getBoundingClientRect();

          if (
            Math.abs(ballRect.left - goalRect.left) < 20 &&
            Math.abs(ballRect.top - goalRect.top) < 20
          ) {
            alert("Level Clear!");
          }
        }
      }

      new GravityPuzzle();
    </script>
  </body>
</html>
