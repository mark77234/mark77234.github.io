<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Space Shooter Enhanced</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
      }
      #gameContainer {
        position: relative;
        width: 100vw;
        height: 100vh;
        background: #000;
        overflow: hidden;
      }
      .player {
        position: absolute;
        color: #3498db;
        font-size: 40px;
        transition: left 0.1s ease-out;
        filter: drop-shadow(0 0 5px #3498db);
      }
      .bullet {
        position: absolute;
        width: 3px;
        height: 20px;
        background: #f1c40f;
        border-radius: 2px;
        transition: bottom 0.1s linear;
      }
      .enemy {
        position: absolute;
        color: #e74c3c;
        font-size: 30px;
        transition: top 0.1s linear;
        filter: drop-shadow(0 0 5px #e74c3c);
      }
      #score {
        position: fixed;
        top: 20px;
        left: 20px;
        color: white;
        font-family: "Courier New", monospace;
        font-size: 24px;
        text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5);
      }
      #gameOver {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0, 0, 0, 0.9);
        padding: 2rem;
        border-radius: 10px;
        text-align: center;
        color: white;
        display: none;
      }
      .explosion {
        position: absolute;
        width: 30px;
        height: 30px;
        background: radial-gradient(circle, #ff8800 0%, #ff2200 100%);
        border-radius: 50%;
        animation: explode 0.5s ease-out;
      }
      @keyframes explode {
        0% {
          transform: scale(0);
          opacity: 1;
        }
        100% {
          transform: scale(3);
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div id="gameContainer">
      <div id="score">Score: 0</div>
      <div class="player">🚀</div>
      <div id="gameOver">
        <h2>Game Over!</h2>
        <p>Final Score: <span id="finalScore">0</span></p>
        <button onclick="location.reload()">Retry</button>
      </div>
    </div>
    <script>
      class EnhancedSpaceShooter {
        constructor() {
          this.container = document.getElementById("gameContainer");
          this.player = document.querySelector(".player");
          this.bullets = new Set();
          this.enemies = new Set();
          this.explosions = new Set();
          this.score = 0;
          this.isGameOver = false;
          this.playerX = window.innerWidth / 2;
          this.moveSpeed = 10;
          this.bulletSpeed = 15;
          this.enemySpeed = 3;
          this.fireRate = 200;
          this.lastFire = 0;

          this.initControls();
          this.gameLoop();
          this.spawnEnemies();
        }

        initControls() {
          // 터치 컨트롤
          document.addEventListener("touchmove", (e) => {
            e.preventDefault();
            this.playerX = e.touches[0].clientX - 20;
            this.clampPlayerPosition();
          });

          // 마우스 컨트롤
          document.addEventListener("mousemove", (e) => {
            this.playerX = e.clientX - 20;
            this.clampPlayerPosition();
          });

          // 발사 컨트롤
          document.addEventListener("click", this.handleShoot.bind(this));
          document.addEventListener("touchstart", this.handleShoot.bind(this));
        }

        clampPlayerPosition() {
          const maxX = window.innerWidth - 40;
          this.playerX = Math.max(0, Math.min(maxX, this.playerX));
          this.player.style.left = `${this.playerX}px`;
        }

        handleShoot(e) {
          if (this.isGameOver) return;
          const now = Date.now();
          if (now - this.lastFire >= this.fireRate) {
            this.shoot(e.clientX || e.touches[0].clientX);
            this.lastFire = now;
          }
        }

        shoot(x) {
          const bullet = document.createElement("div");
          bullet.className = "bullet";
          bullet.style.left = `${x}px`;
          bullet.style.bottom = "100px";
          this.container.appendChild(bullet);
          this.bullets.add(bullet);
        }

        spawnEnemies() {
          setInterval(() => {
            if (this.isGameOver) return;
            this.enemySpeed += 0.1;

            const enemy = document.createElement("div");
            enemy.className = "enemy";
            enemy.textContent = "👾";
            enemy.style.left = `${Math.random() * (window.innerWidth - 50)}px`;
            enemy.style.top = "-50px";
            this.container.appendChild(enemy);
            this.enemies.add(enemy);
          }, 1500 - Math.min(1400, this.score));
        }

        gameLoop() {
          if (this.isGameOver) return;

          // 총알 이동
          this.bullets.forEach((bullet) => {
            const currentBottom = parseFloat(bullet.style.bottom) || 0;
            bullet.style.bottom = `${currentBottom + this.bulletSpeed}px`;

            if (currentBottom > window.innerHeight) {
              bullet.remove();
              this.bullets.delete(bullet);
            }
          });

          // 적 이동 및 충돌 검사
          this.enemies.forEach((enemy) => {
            const currentTop = parseFloat(enemy.style.top) || 0;
            enemy.style.top = `${currentTop + this.enemySpeed}px`;

            // 플레이어 충돌 검사
            if (this.checkCollision(this.player, enemy)) {
              this.gameOver();
              return;
            }

            // 총알 충돌 검사
            this.bullets.forEach((bullet) => {
              if (this.checkCollision(bullet, enemy)) {
                this.createExplosion(enemy);
                enemy.remove();
                bullet.remove();
                this.enemies.delete(enemy);
                this.bullets.delete(bullet);
                this.score += 100;
                document.getElementById(
                  "score"
                ).textContent = `Score: ${this.score}`;
              }
            });

            if (currentTop > window.innerHeight) {
              enemy.remove();
              this.enemies.delete(enemy);
            }
          });

          // 폭발 애니메이션 처리
          this.explosions.forEach((explosion) => {
            if (!explosion.parentElement) {
              this.explosions.delete(explosion);
            }
          });

          requestAnimationFrame(() => this.gameLoop());
        }

        checkCollision(element1, element2) {
          const rect1 = element1.getBoundingClientRect();
          const rect2 = element2.getBoundingClientRect();

          return !(
            rect1.right < rect2.left ||
            rect1.left > rect2.right ||
            rect1.bottom < rect2.top ||
            rect1.top > rect2.bottom
          );
        }

        createExplosion(element) {
          const rect = element.getBoundingClientRect();
          const explosion = document.createElement("div");
          explosion.className = "explosion";
          explosion.style.left = `${rect.left + rect.width / 2}px`;
          explosion.style.top = `${rect.top + rect.height / 2}px`;
          this.container.appendChild(explosion);
          setTimeout(() => explosion.remove(), 500);
          this.explosions.add(explosion);
        }

        gameOver() {
          this.isGameOver = true;
          document.getElementById("gameOver").style.display = "block";
          document.getElementById("finalScore").textContent = this.score;
          this.saveHighScore();
        }

        saveHighScore() {
          const highScore = localStorage.getItem("highScore") || 0;
          if (this.score > highScore) {
            localStorage.setItem("highScore", this.score);
          }
        }
      }

      new EnhancedSpaceShooter();
    </script>
  </body>
</html>
